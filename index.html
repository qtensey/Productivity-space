<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Мої задачі</h1>

    <div class="add-form">
        <form id="create-form">
            <input type="text" id="new-header" placeholder="Назва задачі..." required>
            <textarea id="new-description" placeholder="Опис задачі..." rows="2" required></textarea>
            <button type="submit">Додати задачу</button>
        </form>
    </div>

    <div id="tasks-container">Завантаження з бази даних...</div>
</body>
</html>
