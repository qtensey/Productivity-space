<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій Task Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 40px auto; background-color: #f4f4f9; color: #333; }
        h1 { text-align: center; }
        
        /* Стилі для нової форми */
        .add-form { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .add-form input, .add-form textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        .add-form button { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: background 0.3s; }
        .add-form button:hover { background: #219653; }

        /* Стилі для задач */
        .task { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #3498db; }
        .task h3 { margin: 0 0 10px 0; color: #2c3e50; }
        .status { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; background: #e8f4f8; color: #2980b9; text-transform: uppercase;}
        .date { font-size: 12px; color: #7f8c8d; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <h1>Мої задачі</h1>

    <div class="add-form">
        <form id="create-form">
            <input type="text" id="new-header" placeholder="Назва задачі..." required>
            <textarea id="new-description" placeholder="Опис задачі..." rows="2" required></textarea>
            <button type="submit">Додати задачу</button>
        </form>
    </div>

    <div id="tasks-container">Завантаження з бази даних...</div>

    <script>
        // Функція для завантаження задач (залишилася без змін)
        async function loadTasks() {
            try {
                const response = await fetch('http://127.0.0.1:8000/tasks');
                const tasks = await response.json();
                
                const container = document.getElementById('tasks-container');
                container.innerHTML = ''; 

                if (tasks.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #7f8c8d;">Задач поки немає. Створіть першу!</p>';
                    return;
                }

                // Малюємо задачі
                tasks.forEach(task => {
                    const taskElement = document.createElement('div');
                    taskElement.className = 'task';
                    taskElement.innerHTML = `
                        <h3>[${task.id}] ${task.header}</h3>
                        <p>${task.description}</p>
                        <span class="status">${task.status}</span>
                        <span class="date">Створено: ${task.created_at.split(' ')[0]}</span>
                    `;
                    container.appendChild(taskElement);
                });

            } catch (error) {
                console.error('Помилка:', error);
                document.getElementById('tasks-container').innerHTML = '<p style="color: red;">Помилка з\'єднання із сервером.</p>';
            }
        }

        // 2. НОВА ЛОГІКА: Перехоплюємо відправку форми
        document.getElementById('create-form').addEventListener('submit', async function(event) {
            // Зупиняємо стандартну поведінку браузера (щоб сторінка не перезавантажувалась)
            event.preventDefault();

            // Збираємо текст, який ввів користувач
            const headerText = document.getElementById('new-header').value;
            const descText = document.getElementById('new-description').value;

            try {
                // Відправляємо POST-запит на бекенд
                await fetch('http://127.0.0.1:8000/tasks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json' // Кажемо серверу, що це JSON
                    },
                    // Перетворюємо JavaScript-об'єкт на JSON-рядок
                    body: JSON.stringify({
                        header: headerText,
                        description: descText
                    })
                });

                // Очищуємо поля вводу після успішної відправки
                document.getElementById('new-header').value = '';
                document.getElementById('new-description').value = '';

                // Оновлюємо список задач на екрані (щоб побачити нову)
                loadTasks();

            } catch (error) {
                console.error('Помилка при створенні:', error);
                alert("Не вдалося створити задачу!");
            }
        });

        // Запускаємо завантаження при відкритті сторінки
        loadTasks();
    </script>
</body>
</html>
